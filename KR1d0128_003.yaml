body:
  text: 卷下雜記上第二十有弔者則為位而哭拜踊注不可以殺禮待之殺所例反釋文不稽顙稽音啓以別吉凶別彼列反注同甕甒筲衡注衡當為桁所以庋桁戶庚反庋居綺反實見間間占莧反一解云鄭合見間二字共為覸字音古辨反鋪席乃斂鋪芳烏反後放此上客臨臨力鴆反注及下同則既顈顈孔穎反則皆啐之啐蒼快反瘠為下瘠在益反兄弟之喪內除注而哀已殺所例反祝稱卜葬虞祝之又反稱尺證反歸於賓館歸音匱注同如剡剡以漸反視不明視市志反中路嬰兒失其母焉注嬰猶鷖彌也言其若小兒亡母啼唬彌五兮反唬胡刀反釋文號徐本作唬含襚臨臨力鴆反山節注薄櫨刻之薄薄歷反藻三采六等注以朱白蒼畫之畫胡麥反朿五兩兩五尋注則每卷二丈也卷紀勉反下同純以素純力移反紃以五采紃辭均反並同上喪大記第二十二卷衣投于前卷紀阮反釋文主人二手承衾而哭注哀慕若欲攀援援于願反説髦説他外反注同食於纂者盥纂音虡不辟辟扶移反黼殺殺所例反下及注同君大棺八寸屬六寸椑四寸注以是差之差初宜反君大夫鬊爪實于緑中注必為小橐盛之橐音託今注疏本作小囊依徐音當作橐君殯用輴欑至于上注四注如屋以覆之注之樹反下同大夫殯以幬注幬或作錞或作埻埻都臥反齊五采齊才細反纁披六披甫髲反下同君松椁注抗木為之抗戶剛反並同上祭法第二十三祭法有虞氏節注亦禮之殺也殺所例反釋文大凡人生於天地之間者大音泰設廟祧壇墠注魯煬公者煬音傷並同上祭義第二十四其行也趨趨以數數音速注同釋文比時具物比甫至反注同敬以詘詘丘勿反並同上敬齊之色齊側皆反釋文引王徐以為黔首則黔其嚴反黑也黑首謂民也秦謂民為黔首釋文見間間古辨反夫人繅三盆手注三淹也淹於驗反又於斂反則易直子諒之心子將吏反參直養者也參所林反行肩而不併併扶頂反並同上祭統第二十五盡此三道者盡子忍反下同釋文君執靷靷以忍反薦涗水涗音穢見親疏之殺焉殺所例反下同子行也行胡孟反草艾注給爨亨亨普孟反自名也名武政反下及注自名同而酌之祭器注傅著於鐘鼎也傅音賦著張慮反勤大命施于蒸彝鼎注大約劑約於妙反並同上經解第二十六解胡買反釋文霸王之器也王于況反差若豪氂差初宜反氂音來並同上哀公問第二十七寡人憃愚冥煩蠢昌容反又湯邦反冥亡定反釋文子志之心也注志讀識識音試同上仲尼燕居第二十八給奪慈仁給渠急反又其劫反下同釋文禮也者理也樂也者節也注以造士造七到反爾以為必鋪几筵鋪音孚萬物服體注皆來為瑞應也應於甑反昭然若發矇矣昭之紹反明也並同上孔子間居第二十九為周之翰翰音寒釋文弛其文德弛式氏反子夏蹶然而起蹶音厥並同上坊記第三十坊扶訪反經文皆同釋文辟則坊與辟音譬相彼盍旦盍苦盍反注同禮儀卒度度徒洛反采葑采菲注葑蔓菁也蔓音蠻並同上中庸第三十一則拳拳服膺拳羌權反膺音應又於陵反釋文中立而不倚倚其蟻反費而隱費音弗注同睨而視之睨音詣睥睨也洋洋乎注人思想其傍僾之貌傍方剛反僾於愷反纘大王王季文王之緒纘哉管反親親之殺殺所例反力行近乎仁行下孟反子庶民也子將吏反下句放此則不跲跲躓也躓音致一勺之多勺布若反既明且知知音智釋文哲徐本作知衣錦尚絅絅口定反釋文禪衣也集韻去聲四十六徑絅字注引禮云徐邈讀表記第三十二儳焉如不終日儳在鑑反又仕鑑反釋文易辭也辭猶解説也解音蟹衣服以移之移昌氏反注泛移之移移猶大也同又怡耆反彼記之子記紀吏反雖有庇民之大德庇方至反又音祕凱以強教以強其兩反憃而愚憃昌容反小人之接如醴醴音禮君子淡以成淡徒闞反注同亂是用監監以占反釋文餤徐本作監則穿窬之盜也與窬音豆並同上緇衣第三十三成王之孚王子況反釋文狐裘橫橫橫音黃釋文黃徐本作橫播刑之不迪播補餓反毋以嬖御人疾莊后嬖甫詣反又補弟反德易狎狎戶甲反冬祈寒祈巨尸反私惠不歸德注相惠以褻瀆邪辟之物邪以車反並同上奔喪第三十四絞帶反位絞戶交反釋文問喪第三十五雞斯注雞斯當為笄纚纚所綺反釋文辟踊哭泣辟扶亦反注及下皆同愾焉愾音慨忽代反並同上服問第三十六終殤之月算算音蒜悉亂反釋文是非重麻重治龍反注同無免絰免並音問列也列音例注同並同上間傳第三十七唯而不對唯以水反釋文中月而禫中竹仲反練冠縓緣緣音掾悅絹反禫而纖注纖或作綅綅息廉反又音侵並同上三年問第三十八其愈遲愈音庾差也遲直移反釋文則必反巡過其故鄉巡嗣均反過音戈同上蹢躅焉蹢治革反躅治六反蹢躅不行也釋文踶蹰焉踶音馳字或作踟釋文若駒之過隙過音戈加隆焉爾焉如字緦小功以為殺殺所吏反並同上深衣第三十九帶下無厭髀厭於涉反下同髀亡婢反釋文制十有二幅注以為上下之殺殺所例反純袂緣純邊注緣緆也緆音以豉反並同上投壺第四十某有枉矢哨壺哨以救反釋文主人般還曰辟辟扶亦反注及下同比投不釋比扶質反下同壺頸修七寸頸其聲反毋偝立偝扶戴反並同上儒行第四十一鬻鬻若無能也鬻章六反卑謙貌釋文粥徐本作鬻禮義以為干櫓注干楯楯辭尹反釋文篳門圭窬篳音畢窬音豆同上其任舉有如此者舉音據釋文居御切稱引也集韻去聲九御舉字注引禮云徐邈讀諍而正之諍音爭釋文靜如字徐本作諍世亂不沮沮在呂反注同分散者仁之施也分扶問反不充詘於富貴詘音丘勿反常以儒相詬病詬音遘又呼候反並同上大學第四十二先致其知音智下致知同釋文此之謂自謙苦簟反同上於戲音羲釋文引徐范顧諟天之明命注諟或為題題徒兮反克明峻德峻音俊又私俊反湯之盤銘音冥亡丁反身有所忿懥丁四反又音勩有所好樂五孝反此謂一言賁事賁音奮本又作憤注同百乘之家乘繩證反下及注同並同上昏禮第四十四將合二姓之好合音閣釋文請期請音情又如字合巹而酳合音閣又如字巹音謹破瓢為危也酳音胤又仕覲反並同上鄉飲酒義第四十五則遠於鬭辨矣辨甫免反下同釋文及介省矣省疏幸反注同合樂三終合音閣中者藏也藏才浪反並同上射義第四十六內志正外體直注正鵠之名鵠如字釋文天子以騶虞為節騶側侯反樂循法也循辭均反注被之童童被扶義反孔子射於矍相之圃圃音布射之為言繹也繹音釋以為父鵠鵠如字注同所以養老也養羊尚反合其卒伍合音閣並同上再拜稽首稽音啓釋文稽徐本作稽聘義第四十八曰幾中幾音畿又音基釋文孚尹旁達注孚或作姇姇方附反同上喪服四制第四十九訾之者訾音紫毀也釋文墳墓不培培扶來反高宗諒暗諒暗依注諒讀為梁鵪烏南反下同又並如字然而曰言不文者文音問唯而不對唯以水反注同並同上
