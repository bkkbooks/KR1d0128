body:
  text: 卷中文王世子第八雞初鳴而衣服衣於既反又如字釋文必在視寒暖之節暖沉煩反踐阼而治治直吏反下注治定同凡祭與養老乞言合語之禮合音閣注同下大合樂放此語說命乞言說始鋭反注語說同大司成論說論力頓反注同遠近間三席間古辨反則纖剸亦告于甸人纖子廉反注宮割臏墨劓刖皆以刀鋸臏扶忍反鋸音據有司讞于公讞魚列反言也親親之殺也殺所倒反注殺差也差所宜也敬弔臨臨力鴆反始之養也養羊尚反並同上禮運第九殽於地殽戶交反釋文夫子之極言禮也極紀力反蕢桴而土鼓注築土為鼓也築音竹然後飯腥而苴孰苴爭初反合土合音閣以炮炮扶交反以為醴酪注酪酢酨酨祖冀反粢醍在堂注一曰泛齊泛音泛作其祝號祝之又反注同必舍其祖廟注自拱飭也拱居勇反後拱持同所以治政安君也治直吏反下文注以治事同辟於其義辟芳益反竅於山川竅苦弔反被色被扶義反人情以為田注田人所捊治也捊音普溝反故魚鮪不淰淰舒冉反而禮之藏也藏才浪反不殺也殺所例反注同用水火金木飲食必時注金謂丱人以時取金玉錫石也丱古猛反昆蟲之災注螟螽之屬也螽音終山出器車注器若銀罋丹甑也罋於弄反並同上皆在郊棷棷總會反澤也釋文集韻去聲十四太祖外切棷字注引禮麒麟在郊棷徐邈讀禮器第十如竹箭之有筠也注箭篠也篠音小釋文以地廣狹注謂貢賦之常差差初宜反是故年雖大殺殺所例反注同不臺門注闍者謂之臺闍常邪反大圭不琢琢依字竹角反溫之至也注皆為溫藉藉子夜反而稿鞂之設鞂古八反君子達亹亹焉亹音尾君西酌犧象注祼用雞彝鳥彝彝音夷羹定詔於堂定丁磬反並同上郊特牲第十一往德也往于況反釋文庭燎之百燎力弔反用騂騂呼營反汜掃反道注反道剗令新土在上也剗初展反帝牛必在滌滌徒嘯反喪殺也殺所例反既蠟而收注收謂收斂積聚也積聚上音茲賜反下才樹反武壯而不可樂也樂五教反而不可便其利也便比絹反莞簟之安而蒲活稿鞂之尚莞音九鞂古八反冠而敝之敝房列反棄也滌蕩其聲滌同弔反樂三闋三息暫反蕭合黍稷合音閣或諸遠人乎遠于萬反嘏長也長知兩反于舊澤之酒也澤詩石反並同上內則第十二咸盥漱漱素遘反漱漱口也下同釋文櫛縰縰所綺反黑繒韜髮搢笏搢音箭又如字音晉插也注搢猶扱也扱采協反管滯釋文遘時世反徐作滯笄總注笄今簪也簪側林反又作南反施縏袠注縏小橐也橐音託蕡稻蕡扶畏反大麻子注同昧爽而朝注後成人也後胡豆反下同有命之應唯唯伊水反睇視視市志反衣裳綻裂紉針請補綴綻治見反紉針而陳反下之林反芥醬芥姬邁反清糟糟沮到反醷濫醷於力反糗餌粉酏注與狼臅膏為餰臅音燭食蝸醢而苽食食如字折稌稌他古反腶修注捶脯施薑桂也捶之蕊反鳥皫色皫芳表反又普表反而般臂臂方避反麇為辟雞辟芳益反實諸醯醯呼兮反塗之以謹塗謹如字以付豚付音傅必脄脄亡代反夾脊肉去其餌注餌筋腱也腱其偃反以酒諸上酒西見反注其一肝膋是也膋音勞同藏無間間間廁之間詩負之注詩之言承也承音拯救之拯翦髮為鬌鬌大果反男唯女俞唯以水反姆教婉娩聽從婉紆願反娩音萬並同上玉藻第十三前後邃延延餘戰反釋文朝辨色始入辨扶免反夫人與君同庖庖扶交反下同搢本搢音箭又如字並同上君羔幦虎犆幦苦狄反釋文覆笭也集韻入聲二十三錫幦字注諸侯荼前詘後直後胡豆反釋文注詘謂圜殺其首殺所列反篇內皆同同上隱辟而后屨辟房亦反注同綦組纓綦其記反雜色也居冠屬武注著冠於武著竹略反縫齊倍要注縫紩也紩治粟反緣廣半寸廣公曠反後放此禪為絅絅音迥而素帶終辟辟音卑下緇辟終辟皆放此凡君召以三節注鎮圭以徵守鎮音珍是以非辟之心辟芳益反並同上士佩礝玫礝而兗反釋文瓀而兗反徐又作礝同瓜祭上環注上環頭忖也忖子本反釋文呼唯而不諾唯以水反大夫中棖注棖門楔也楔古八反圈豚豚徒困反注同端行頤霤注頤或為䨨也䨨音追朝廷濟濟翔翔濟子禮反有威儀也並同上立容德德音置釋文蓋如有所置物於前也集韻去聲七志德字注視容清明視市志反釋文公子曰臣孽孽五列反同上明堂位第十四頒度量量音亮注同釋文山節注刻欂盧為山也欂薄歷反乘路乘食證反注同揩擊大瑟釋文云大琴徐本作瑟周縣鼓注殷頌曰植我鼗鼓植音徒吏反又徒力反女媧之笙簧媧古娃反又古華反夏后氏之龍𧇽注植曰𧇽植徒力反殷之崇牙注以挂縣紘也紘音宏夏石氏以楬豆楬苦瞎反注同又苦八反夏后氏之綢練綢音籌並同上喪服小記第十五其餘則否注恩殺於父母殺所例反後文注同釋文從祖祔食祔音附注為墠祭之墠徒丹反而父稅喪稅他外反注及下同無事不辟廟門辟扶亦反其孫不降其父注祖不厭孫也厭於艷反下文注皆同詘而反以報之注合而糾之糾居虯反並同上大傳第十六干祫及其高祖祫音洽釋文五者一物紕繆紕孚夷反又方齊反殺同姓也殺所例反並同上少儀第十七某固願聞名於將命者聞音問注皆同釋文致廢衣於賈人賈音估注同不以鬣注掃恆掃地不潔清也清才性反又如字執箕膺擖擖音葉拖諸幦幦音覓而無訕訕所姦反齊齊皇皇皇于沉反軍旅思險注險阻出奇覆諼之處也覆音赴祭膴膴況紆反麇為辟雞辟扶益反注同尸則坐注擩于俎擩耳誰反則辟咡而對辟孚益反並同上學記第十八足以謏聞謏所穆反釋文集韻入聲一屋作所六切謏字注引徐邈讀中年考挍中丁仲反釋文相觀而善之謂摩摩亡髲反則壞亂而不修壞胡拜反強而弗抑強其兩反下同大信不約約於妙反並同上樂記第十九其聲噍以殺噍在堯反釋文殺所列反釋文則無怗懘之音矣怗昌廉反弊也釋文綴兆舒疾綴丁衛反下綴遠綴短皆同王者功成作樂王于況反孰亨而祀亨許兩反暖之以日月暖許袁反世亂則禮慝而樂淫注慝穢也穢烏會反煦嫗煦況甫反嫗於甫反下及注同區萌達區丘于反一音烏侯反毛者孕鬻鬻扶袁反並同上而卵生者不殈殈況逼反一音況狄反卵折不成曰殈猶裂也釋文治亂以相相思章反釋文與音相近近如字克順克俾俾扶志反齊音敖辟喬志辟芳益反喬音驕以和之和胡臥反鐘聲鏗鏗苦庚反非聽其鏗鏘而已矣鏘敕庚反敢問遲之遲而又久遲直尼反且女獨未聞牧野之語乎野以汝反名之曰建櫜建其偃反裨冕搢笏注搢猶插也插采協反則易直子諒之心子將吏反繁瘠廉肉注聲之鴻殺也殺所例反請誦其所聞請音情並同上
