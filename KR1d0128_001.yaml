body:
  text: 卷上曲禮上第一儼若思思息嗣反陸德明釋文使從俗注牲幣之屬幣扶世反決嫌疑決古穴反不侵侮侮亡撫反分爭辨訟辨方勉反涖官行法涖普利沈力二反又力位反非禮不誠不莊莊側亮反故父子聚麀注麀牝曰麀牝頻忍反昏定而晨省注定安其床衽也衽而鴆反席也則肩隨之注與之竝行差退差初宜反冠衣不純素注素紕紕補移反童子不衣裘裳注裘大他佐反負劍辟咡詔之辟芳益反咡如志反視必下視音示視瞻毋回毋如字摳衣趨隅趨音奏又如字必慎唯諾唯于比反連步以上注重蹉跌也重治恭反凡為長者𢹔之禮𢹔音奮掃席前曰𢹔必加帚於箕上注執箕膺擖膺於陵反以袂拘而退拘音俱毋儳言儳士鑒反又蒼鑒反又蒼陷反毋勦說說舒鋭反注勦猶攬也謂取人之說以為己說攬力敢反請益則起注請益曰無倦倦久戀反唯而起唯于比反注同讓食不唾注嫌有穢惡穢烏外反毋淫視視市志反立毋跛跛方寄反不同椸枷枷音嫁不以隱疾注尚可指擲擲吐歷反或音的食居人之左食音自醯醬處內醯音海主人親饋饋具類反毋固獲鄭橫霸反一音護毋嘬炙注牲特少牢少式照反御食於君君賜餘器之溉者不寫其餘皆寫注重汙辱君之器也重治龍反庶人齕之齕胡切反冠者不櫛冠古亂反注憂不為容也為于僞反畜鳥者則勿佛也注畜養也養則馴畜況又反馴食倫反左手承弣弣音甫下同尊卑垂帨注帨佩巾也磬折則佩垂帨始鋭反磬苦定反折時列反又之列反則載貔貅貔扶夷反招搖在上注星在北斗杓杓必遙反四郊多壘壘力軌反又力水反祭器敝則埋之埋武乖反左右攘辟辟扶亦反車驅而騶至于大門驅起遇反騶仕遘反立視五巂注巂或為蕊蕊而愧反以策彗恤勿驅彗雖醉反又囚歲反以足蹙路馬芻有誅蹙采六反又子六反並同上曲禮下第二主佩倚其綺反釋文踰竟為壇位壇音善注同分職受政分扶問反司貨注丱人也丱故孟反丱人掌金玉錫石未成器者九州之長入天子之國曰牧牧音目天子當寧而立寧珍呂反又音儲門屏之間曰寧涖牲曰盟涖力二反又音類盟音亡幸反注坎用牲坎苦敢反諸侯以肥牛注肥養於滌也滌同弔反犬曰羹獻羹音衡鮮魚曰脡祭脡唐頂反夫曰皇辟辟扶亦反士視五步注上下遊目遊音流凡摯摯之二反以纓拾矢可也注拾謂射韝韝音溝又古侯反並同上檀弓上第三微子舍其孫遁遁徒本反又徒遜反左右就養無方左右上音佐下音佑釋文杜氏之葬葬才浪反又如字請合葬焉合音閣後合葬皆同注欲文過之文音問喪三年以為極亡極紀力反孔子少孤注孔子之父聊叔紇紇胡切反又胡沒反戎事乘驪驪郎志反純黑色馬牲用騂騂呼營反純赤色也饘粥之食粥音育布幕衛也縿幕魯也幕音覓下同縿音蕭注縿讀如綃綃本又作綃桑堯反君謂我欲弒君也弒音式本又作嗣音同再拜稽首乃卒注乃雉經經古定反如雉之自經也並同上華而睆睆音刮釋文古刮切明貌集韻入聲十五舝睆字注夫子之病革矣革音極注同釋文而弗除也除治慮反小功不稅稅他外反注同退而老於西河之上注龍門至華陰之地華胡化反使子貢說驂而賻之說始鋭反下及注同遇於一哀而出涕出尺遂反綢練設旐綢直留反注同蟻結於四隅注蟻蚍蜉也蚍扶夷反請問居從父昆弟之仇從才用反公叔文子注名拔拔蒲末反公叔木木之樹反易之而己易以豉反縣棺而封封甫鄧反見若覆夏屋者矣注覆謂茨瓦也茨在私反茅覆屋今一日而三斬板注其廣袤亡侯反君即位而為椑椑戾益反親尸棺並同上檀弓下第四蟜固不說齊衰說音申鋭反下同釋文曾點倚其門而歌倚其綺反主人曰臨臨力鴆反或曰由魯嫁注嫁於王者之後王于況反子顯注顯當作韅韅苦見反慍哀之變也慍又音鬱啜主人主婦室老啜昌悅反反諸其所養也養羊尚反桃茢茢音例勉而為瘠瘠在益反男子西鄉婦人東鄉注夾羡道為位羡音賤諸侯請含注以朋友有啖食之道食音自請庚之注庚償也償音尚刎其人刎亡粉反黔敖黔渠嚴反貿貿然來貿亡救反又音茂執女手之拳然女音汝其言訥訥然訥奴劣反管庫之士注管鍵也鍵其偃反鑰也並同上王制第五王于況反釋文上農夫食九人食音自其祿以是為差也差初宜反下注同是故公家不畜刑人注髡者使守積髡戶官反志淫好辟辟芳亦反天子不合圍合音閣獺祭魚獺他達反又他瞎反皆造焉造七到反慎測淺深之量量音亮後皆同異服注若聚鷸冠鷸音述殷人以食禮注凡飲養陽氣養以尚反下同周人養國老於東膠注膠之言糾也糾居酉反天子皆有湯沐之邑注給齊戒自潔清之用清才性反並同上月令第六昏參中中竹仲反後放此宿離不貸宿音秀貸音二猋風暴雨總至猋方遙反省囹圄省所幸反遊牝子牧牝扶盡反則蝗蟲為災蝗華孟反舉五穀之要注定其租稅之薄薄步各反並同上曾子問第七大祝裨冕注裨冕絺冕也絺張履反釋文祝聲三祝之又反亟舉兵亟起吏反簠簋既陳簠方于反又音蒲賤不誄貴注誄之以作諡諡以二反不綏祭綏況垂反注同不歸肉歸其位反望墓而為壇以時祭注遠辟正主遠于萬反且不乎且子餘反並同上
